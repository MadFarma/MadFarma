<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Main text "MadFarma" with pharmacy cross icon -->
  <g transform="translate(5, 5)">
    <!-- Pharmacy cross icon -->
    <rect x="0" y="8" width="6" height="18" rx="2" fill="#5D8A82"/>
    <rect x="2" y="4" width="18" height="6" rx="2" fill="#5D8A82"/>
    <rect x="12" y="14" width="6" height="18" rx="2" fill="#5D8A82"/>
  </g>
  <!-- "Mad" text -->
  <text x="38" y="22" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="700" fill="#5D8A82">Mad</text>
  <!-- "Farma" text -->
  <text x="72" y="22" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="400" fill="#5D8A82">Farma</text>
  <!-- Slogan line -->
  <text x="38" y="38" font-family="Arial, sans-serif" font-size="9" fill="#6B7580">Tu farmacia online de confianza</text>
</svg>